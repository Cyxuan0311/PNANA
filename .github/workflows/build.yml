---
name: Build and Test

on:
  push:
    branches: [master, develop, fix/ci-actions]
    paths:
      - 'CMakeLists.txt'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/build.yml'
      - 'cmake/**'
      - 'go.mod'
  pull_request:
    branches: [master, develop, fix/ci-actions]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # 多架构构建矩阵
  build-matrix:
    name: Build ${{ matrix.arch }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux
          - os: ubuntu-22.04
            arch: x86_64
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
          - os: ubuntu-22.04
            arch: x86_64
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release

          # ARM64 Linux (交叉编译)
          - os: ubuntu-22.04
            arch: arm64
            compiler: gcc
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            build_type: Release
            cross_compile: true

          # ARMv7 Linux (交叉编译)
          - os: ubuntu-22.04
            arch: armv7
            compiler: gcc
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            build_type: Release
            cross_compile: true

          # RISC-V 64 Linux (交叉编译)
          - os: ubuntu-22.04
            arch: riscv64
            compiler: gcc
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            build_type: Release
            cross_compile: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation tools (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-arm64 \
            libc6-dev-arm64-cross \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install cross-compilation tools (ARMv7)
        if: matrix.arch == 'armv7'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-armhf \
            libc6-dev-armhf-cross \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf

      - name: Install cross-compilation tools (RISC-V 64)
        if: matrix.arch == 'riscv64'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-riscv64 \
            libc6-dev-riscv64-cross \
            libatomic1-riscv64-cross \
            gcc-riscv64-linux-gnu \
            g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            pkg-config \
            nlohmann-json3-dev \
            liblua5.4-dev \
            libtree-sitter-dev \
            libavformat-dev \
            libavcodec-dev \
            libswscale-dev \
            libavutil-dev \
            golang-go \
            libncurses-dev \
            libtinfo-dev \
            git \
            ccache \
            curl \
            libcurl4-openssl-dev \
            libvterm-dev \
            libchafa-dev \
            libglib2.0-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Configure CGO for cross-compilation
        run: |
          # 关键修复：清空错误的 -m64 标志（ARM64/RISC-V 不支持）
          export CGO_CFLAGS="-fPIC"
          export CGO_LDFLAGS=""
          export CGO_ENABLED=1
          
          # 根据架构设置编译器
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            export CC=arm-linux-gnueabihf-gcc
            export CXX=arm-linux-gnueabihf-g++
          elif [ "${{ matrix.arch }}" = "riscv64" ]; then
            export CC=riscv64-linux-gnu-gcc
            export CXX=riscv64-linux-gnu-g++
          else
            # x86_64 使用默认设置
            export CC=gcc
            export CXX=g++
          fi
          
          # 输出配置信息
          echo "CGO_CFLAGS=$CGO_CFLAGS"
          echo "CGO_LDFLAGS=$CGO_LDFLAGS"
          echo "CC=$CC"
          echo "CXX=$CXX"

      - name: Build and install FTXUI (native)
        if: "!matrix.cross_compile"
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ArthurSonzogni/FTXUI.git
          cd FTXUI
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DFTXUI_BUILD_EXAMPLES=OFF \
            -DFTXUI_BUILD_DOCS=OFF \
            -DFTXUI_ENABLE_INSTALL=ON
          make -j$(nproc)
          sudo make install
          cd ../..
          rm -rf FTXUI

      - name: Build and install FTXUI (cross-compile)
        if: "matrix.cross_compile"
        run: |
          set +x
          git clone --depth 1 --branch main \
            https://github.com/ArthurSonzogni/FTXUI.git
          cd FTXUI
          mkdir build && cd build
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            C_COMPILER=aarch64-linux-gnu-gcc
            CXX_COMPILER=aarch64-linux-gnu-g++
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            C_COMPILER=arm-linux-gnueabihf-gcc
            CXX_COMPILER=arm-linux-gnueabihf-g++
          elif [ "${{ matrix.arch }}" = "riscv64" ]; then
            C_COMPILER=riscv64-linux-gnu-gcc
            CXX_COMPILER=riscv64-linux-gnu-g++
          fi
          
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DFTXUI_BUILD_EXAMPLES=OFF \
            -DFTXUI_BUILD_DOCS=OFF \
            -DFTXUI_ENABLE_INSTALL=ON \
            -DCMAKE_C_COMPILER=$C_COMPILER \
            -DCMAKE_CXX_COMPILER=$CXX_COMPILER \
            -DCMAKE_TOOLCHAIN_FILE=../../cmake/toolchain-${{ matrix.arch }}.cmake
          make -j$(nproc)
          sudo make install
          cd ../..
          rm -rf FTXUI

      - name: Setup environment
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.arch }}-ccache

      - name: Configure CMake (Full Build)
        run: |
          set +x
          rm -rf build
          mkdir -p build
          cd build
          
          CMAKE_ARGS=(
            -G Ninja
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            -DCMAKE_PREFIX_PATH=/usr/local
            -DBUILD_TESTING=ON
            -DBUILD_IMAGE_PREVIEW=ON
            -DBUILD_TREE_SITTER=ON
            -DBUILD_LUA=ON
            -DBUILD_GO=ON
            -DBUILD_LIBVTERM=ON
            -DBUILD_AI_CLIENT=ON
            -DBUILD_ICONV_SUPPORT=ON
          )
          
          if [ "${{ matrix.cross_compile }}" = "true" ]; then
            CMAKE_ARGS+=(
              -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-${{ matrix.arch }}.cmake
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.arch }}
            )
          fi
          
          cmake .. "${CMAKE_ARGS[@]}"

      - name: Build
        run: |
          cd build
          ninja -j$(nproc) -v

      - name: Show ccache stats
        run: ccache -s

      - name: Verify binary architecture
        run: |
          cd build
          echo "=== Binary Information ==="
          file pnana
          if command -v readelf &> /dev/null; then
            readelf -h pnana | grep -E "Class|Machine"
          fi
          echo "=== Architecture: ${{ matrix.arch }} ==="

      - name: Test (native only)
        if: "!matrix.cross_compile"
        run: |
          cd build
          ctest --output-on-failure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release'
        with:
          name: pnana-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.compiler }}
          path: |
            build/pnana
            build/compile_commands.json
          retention-days: 14

  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          clang-format --version

      - name: Check code formatting
        run: |
          echo "Checking code formatting..."
          echo "Files to check:"
          find src include -name "*.cpp" -o -name "*.h" | head -20
          
          echo "Running clang-format check..."
          if find src include -name "*.cpp" -o -name "*.h" | \
              xargs clang-format --dry-run --Werror --style=file 2>&1 | tee /tmp/clang-format-output.log; then
            echo "✅ Code formatting check passed!"
          else
            echo "❌ Code formatting check failed."
            echo ""
            echo "Failed files:"
            cat /tmp/clang-format-output.log | head -20
            echo ""
            echo "To fix locally, run:"
            echo "  find src include -name \"*.cpp\" -o -name \"*.h\" | xargs clang-format -i"
            exit 1
          fi

  # 安全扫描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 架构报告
  arch-report:
    name: Generate Architecture Report
    runs-on: ubuntu-22.04
    needs: build-matrix
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate architecture compatibility report
        run: |
          echo "## Architecture Build Report" > arch_report.md
          echo "" >> arch_report.md
          echo "Generated at: $(date -u)" >> arch_report.md
          echo "" >> arch_report.md
          echo "| Architecture | OS | Compiler | Status |" >> arch_report.md
          echo "|--------------|-----|----------|--------|" >> arch_report.md

          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              arch=$(echo "$name" | grep -oP '(?<=-)(x86_64|arm64|armv7|riscv64)(?=-)')
              os=$(echo "$name" | grep -oP '(?<=pnana-)(ubuntu-[0-9.]+)(?=-)')
              compiler=$(echo "$name" | grep -oP '(?<=-)(gcc|clang)$')
              
              if [ -f "$dir/pnana" ]; then
                status="✅ Success"
              else
                status="❌ Failed"
              fi
              
              echo "| ${arch:-unknown} | ${os:-unknown} | ${compiler:-unknown} | ${status} |" >> arch_report.md
            fi
          done

          cat arch_report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: architecture-report
          path: arch_report.md
          retention-days: 30
