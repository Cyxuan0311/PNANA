---
name: Release

permissions:
  contents: write  # Required to create tags and releases
  packages: write  # Required for package uploads

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0).
          If not provided, will extract from CHANGELOG.md'
        required: false
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - alpha
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
    paths:
      - 'CHANGELOG.md'

env:
  BUILD_TYPE: Release

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      release_notes: ${{ steps.generate-notes.outputs.release_notes }}
      tag_name: ${{ steps.extract-version.outputs.tag_name }}
      should_release: ${{ steps.check-release.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CHANGELOG.md
        id: extract-version
        run: |
          # 如果手动指定了版本，使用指定的版本
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从 CHANGELOG.md 提取版本号
            # 查找第一个版本号（跳过 Unreleased）
            VERSION=$(grep -E '^\#\# \[[0-9]+\.[0-9]+\.[0-9]+\]' \
              CHANGELOG.md | head -1 | \
              sed -E 's/^\#\# \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')
            if [ -z "$VERSION" ]; then
              echo "Error: Could not extract version from CHANGELOG.md"
              exit 1
            fi
          fi

          # 生成 tag 名称
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'stable' }}"
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="v${VERSION}-${RELEASE_TYPE}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"
          echo "Tag name: ${TAG_NAME}"

      - name: Check if release should be created
        id: check-release
        run: |
          # 检查是否已经有这个 tag
          if git tag -l "${{ steps.extract-version.outputs.tag_name }}" | \
              grep -q "${{ steps.extract-version.outputs.tag_name }}"; then
            echo "Tag ${{ steps.extract-version.outputs.tag_name }} \
              already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: generate-notes
        if: steps.check-release.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'stable' }}"

          # 从 CHANGELOG.md 提取当前版本的变更
          RELEASE_NOTES=$(awk -v version="$VERSION" '
          BEGIN { found=0; in_section=0 }
          /^\#\# \['version'\]/ { found=1; in_section=1; next }
          /^\#\# \[/ && found { exit }
          in_section && /^### / { print "## " $2; next }
          in_section && /^-/ { print $0; next }
          ' CHANGELOG.md)

          # 如果没有找到变更，使用默认模板
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="## New Features
          - Release notes will be generated based on CHANGELOG.md

          ## Improvements
          - Automated release process

          ## Fixes
          - Bug fixes and improvements"
          fi

          # 生成完整的 release notes
          RELEASE_NOTES="# Release v${VERSION}

          ${RELEASE_NOTES}

          ## Installation

          ### Ubuntu/Debian (.deb)
          \`\`\`bash
          wget https://github.com/${{ github.repository }}/releases/download/\
            v${VERSION}/pnana_${VERSION}_amd64.deb
          sudo dpkg -i pnana_${VERSION}_amd64.deb
          sudo apt-get install -f  # If there are dependency issues
          \`\`\`

          ### Red Hat/Fedora/CentOS (.rpm)
          \`\`\`bash
          wget https://github.com/${{ github.repository }}/releases/download/\
            v${VERSION}/pnana_${VERSION}_x86_64.rpm
          sudo rpm -i pnana_${VERSION}_x86_64.rpm
          \`\`\`

          ### Generic Linux
          Choose the appropriate archive for your system:
          - \`.tar.gz\` (gzip compressed)
          - \`.tar.xz\` (xz compressed)
          - \`.tar.bz2\` (bzip2 compressed)
          - \`.zip\` (zip compressed)

          \`\`\`bash
          # Download the appropriate archive
          wget https://github.com/${{ github.repository }}/releases/download/\
            v${VERSION}/pnana-ubuntu22.04.tar.gz

          # Extract and install
          tar -xzf pnana-ubuntu22.04.tar.gz
          cd pnana-ubuntu22.04
          sudo ./install.sh
          \`\`\`

          ## Usage
          \`\`\`bash
          # Start blank editor
          pnana

          # Open file
          pnana filename.txt

          # View help
          pnana --help
          \`\`\`

          ## What's Changed
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/\
            blob/main/CHANGELOG.md) for full details."

          # Escape newlines for GitHub output
          RELEASE_NOTES="${RELEASE_NOTES//'%'/'%25'}"
          RELEASE_NOTES="${RELEASE_NOTES//$'\n'/'%0A'}"
          RELEASE_NOTES="${RELEASE_NOTES//$'\r'/'%0D'}"

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          # x86_64 native build
          - arch: x86_64
            arch_name: amd64
            cross_compile: false
            package_deb: "pnana_${{ needs.prepare-release.outputs.version }}_amd64.deb"
            package_rpm: "pnana_${{ needs.prepare-release.outputs.version }}_x86_64.rpm"
            package_tar: "pnana-ubuntu22.04-x86_64.tar.gz"
          # ARM64 cross-compile
          - arch: arm64
            arch_name: arm64
            cross_compile: true
            package_deb: "pnana_${{ needs.prepare-release.outputs.version }}_arm64.deb"
            package_rpm: "pnana_${{ needs.prepare-release.outputs.version }}_aarch64.rpm"
            package_tar: "pnana-ubuntu22.04-arm64.tar.gz"
          # ARMv7 cross-compile
          - arch: armv7
            arch_name: armhf
            cross_compile: true
            package_deb: "pnana_${{ needs.prepare-release.outputs.version }}_armhf.deb"
            package_rpm: "pnana_${{ needs.prepare-release.outputs.version }}_armv7hl.rpm"
            package_tar: "pnana-ubuntu22.04-armv7.tar.gz"
          # RISC-V 64 cross-compile
          - arch: riscv64
            arch_name: riscv64
            cross_compile: true
            package_deb: "pnana_${{ needs.prepare-release.outputs.version }}_riscv64.deb"
            package_rpm: "pnana_${{ needs.prepare-release.outputs.version }}_riscv64.rpm"
            package_tar: "pnana-ubuntu22.04-riscv64.tar.gz"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross-compilation tools (ARM64)
        if: matrix.cross_compile && matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-arm64 \
            libc6-dev-arm64-cross \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install cross-compilation tools (ARMv7)
        if: matrix.cross_compile && matrix.arch == 'armv7'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-armhf \
            libc6-dev-armhf-cross \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf

      - name: Install cross-compilation tools (RISC-V 64)
        if: matrix.cross_compile && matrix.arch == 'riscv64'
        run: |
          sudo apt-get install -y \
            crossbuild-essential-riscv64 \
            libc6-dev-riscv64-cross \
            libatomic1-riscv64-cross \
            gcc-riscv64-linux-gnu \
            g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            pkg-config \
            dpkg-dev \
            rpm \
            libarchive-tools \
            git \
            ccache

      - name: Build and install FTXUI (native)
        if: "!matrix.cross_compile"
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ArthurSonzogni/FTXUI.git
          cd FTXUI
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DFTXUI_BUILD_EXAMPLES=OFF \
            -DFTXUI_BUILD_DOCS=OFF \
            -DFTXUI_ENABLE_INSTALL=ON
          make -j$(nproc)
          sudo make install
          cd ../..
          rm -rf FTXUI

      - name: Build and install FTXUI (cross-compile)
        if: "matrix.cross_compile"
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ArthurSonzogni/FTXUI.git
          cd FTXUI
          mkdir build && cd build
          
          # 根据架构设置编译器
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            C_COMPILER=aarch64-linux-gnu-gcc
            CXX_COMPILER=aarch64-linux-gnu-g++
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            C_COMPILER=arm-linux-gnueabihf-gcc
            CXX_COMPILER=arm-linux-gnueabihf-g++
          elif [ "${{ matrix.arch }}" = "riscv64" ]; then
            C_COMPILER=riscv64-linux-gnu-gcc
            CXX_COMPILER=riscv64-linux-gnu-g++
          fi
          
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DFTXUI_BUILD_EXAMPLES=OFF \
            -DFTXUI_BUILD_DOCS=OFF \
            -DFTXUI_ENABLE_INSTALL=ON \
            -DCMAKE_C_COMPILER=$C_COMPILER \
            -DCMAKE_CXX_COMPILER=$CXX_COMPILER \
            -DCMAKE_TOOLCHAIN_FILE=../../cmake/toolchain-${{ matrix.arch }}.cmake
          make -j$(nproc)
          sudo make install
          cd ../..
          rm -rf FTXUI

      - name: Setup environment
        run: |
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV
          echo "TARGET_ARCH=${{ matrix.arch_name }}" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.arch }}-ccache

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          if [ "${{ matrix.cross_compile }}" = "true" ]; then
            cmake .. \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_PREFIX_PATH=/usr/local \
              -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-${{ matrix.arch }}.cmake \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.arch }} \
              -DBUILD_IMAGE_PREVIEW=OFF \
              -DBUILD_TREE_SITTER=OFF \
              -DBUILD_LUA=OFF \
              -DBUILD_SSH_MODE=NONE \
              -DBUILD_LIBVTERM=OFF \
              -DBUILD_AI_CLIENT=OFF
          else
            cmake .. \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_PREFIX_PATH=/usr/local \
              -DBUILD_IMAGE_PREVIEW=OFF \
              -DBUILD_TREE_SITTER=OFF \
              -DBUILD_LUA=OFF \
              -DBUILD_SSH_MODE=NONE \
              -DBUILD_LIBVTERM=OFF \
              -DBUILD_AI_CLIENT=OFF
          fi

      - name: Build project
        run: |
          cd build
          ninja -j$(nproc)

      - name: Show ccache stats
        run: ccache -s

      - name: Verify binary architecture
        run: |
          cd build
          echo "=== Binary Information ==="
          file pnana
          if command -v readelf &> /dev/null; then
            readelf -h pnana | grep -E "Class|Machine"
          fi

      - name: Create DEB package
        run: |
          cd build
          cpack -G DEB \
            -DCPACK_PACKAGE_FILE_NAME="${{ matrix.package_deb }}" \
            -DCPACK_DEBIAN_PACKAGE_ARCHITECTURE=${{ matrix.arch_name }}
          echo "Generated DEB package:"
          ls -la *.deb

      - name: Create RPM package
        run: |
          cd build
          cpack -G RPM \
            -DCPACK_PACKAGE_FILE_NAME="${{ matrix.package_rpm }}" \
            -DCPACK_RPM_PACKAGE_ARCHITECTURE=${{ matrix.arch_name == 'armhf' && 'armv7hl' || matrix.arch_name }}
          echo "Generated RPM package:"
          ls -la *.rpm

      - name: Create TAR.GZ package
        run: |
          cd build
          cpack -G TGZ \
            -DCPACK_PACKAGE_FILE_NAME="${{ matrix.package_tar }}"
          echo "Generated TAR.GZ package:"
          ls -la *.tar.gz

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch_name }}
          path: build/${{ matrix.package_deb }}
          retention-days: 30

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch_name }}
          path: build/${{ matrix.package_rpm }}
          retention-days: 30

      - name: Upload TAR.GZ package
        uses: actions/upload-artifact@v4
        with:
          name: tar-${{ matrix.arch_name }}
          path: build/${{ matrix.package_tar }}
          retention-days: 30

  create-release:
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts structure ==="
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) | head -30
          echo ""
          echo "=== Artifacts directory structure ==="
          ls -la artifacts/
          echo ""
          echo "=== Collecting all packages ==="
          mkdir -p release-packages
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              echo "Processing $dir"
              cp "$dir"/*.deb "$dir"/*.rpm "$dir"/*.tar.gz release-packages/ 2>/dev/null || true
            fi
          done
          echo ""
          echo "=== Packages ready for release ==="
          ls -la release-packages/

      - name: Create Git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git tag ${{ needs.prepare-release.outputs.tag_name }}
          git push origin ${{ needs.prepare-release.outputs.tag_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: Release ${{ needs.prepare-release.outputs.tag_name }}
          body: ${{ needs.prepare-release.outputs.release_notes }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.release_type != 'stable' }}
          files: |
            release-packages/*.deb
            release-packages/*.rpm
            release-packages/*.tar.gz

      - name: Update CHANGELOG.md after release
        if: github.event_name == 'push'
        run: |
          # 将 Unreleased 部分移动到已发布版本
          # 这里可以添加更多的自动化处理逻辑
